<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Library — Sign Up</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Digital Library</h1>
      <p class="subtitle">Create your account</p>
      <form id="signupForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Choose a username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Choose a password" required autocomplete="new-password">
        </div>
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Create Account</button>
        <p id="error" class="error-msg"></p>
      </form>
      <p style="text-align:center; margin-top:1.25rem; font-size:0.88rem; color:var(--muted)">
        Already have an account? <a href="/login" style="color:var(--accent); text-decoration:none; font-weight:500">Sign in</a>
      </p>
    </div>
  </div>
  <script src="/static/signup.js"></script>
</body>
</html>
