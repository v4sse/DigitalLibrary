<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Digital Library — Login</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="login-wrap">
    <div class="login-card">
      <h1>Digital Library</h1>
      <p class="subtitle">Sign in to your account</p>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter username" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter password" required autocomplete="current-password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%">Sign In</button>
        <p id="error" class="error-msg"></p>
      </form>
      <p style="text-align:center; margin-top:1.25rem; font-size:0.88rem; color:var(--muted)">
        Don't have an account? <a href="/signup" style="color:var(--accent); text-decoration:none; font-weight:500">Sign up</a>
      </p>
    </div>
  </div>
  <script src="/static/login.js"></script>
</body>
</html>
